<!-- Mermaid diagram support.

     kramdown + rouge renders ```mermaid fences as
       <div class="language-mermaid highlighter-rouge">
         <div class="highlight"><pre class="highlight"><code>...</code></pre></div>
       </div>

     Mermaid's own auto-init looks for <div class="mermaid">...</div>, so we
     replace the rouge-emitted markup with a bare .mermaid container before
     calling mermaid.run(). -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('div.language-mermaid').forEach(function (el) {
      var code = el.querySelector('code');
      var text = (code ? code.textContent : el.textContent).trim();
      var container = document.createElement('div');
      container.className = 'mermaid';
      container.textContent = text;
      el.parentNode.replaceChild(container, el);
    });
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        flowchart: { htmlLabels: true, curve: 'basis' }
      });
      mermaid.run();
    }
  });
</script>
<style>
  /* Give the rendered flowchart room to breathe inside Cayman's <section>. */
  .mermaid { text-align: center; margin: 1.5rem 0; overflow-x: auto; }
  .mermaid svg { max-width: 100%; height: auto; }
</style>
